syntax = "proto3";
package resonance;

message AuthRequest {
    bytes psk_hash = 1;
}

message ServerHello {
    string session_id = 1;
    bytes key_material = 2;
    string assigned_ip = 3;
}

message Ping {
    uint64 timestamp = 1;
}

message Pong {
    uint64 timestamp = 1;
}

message Error {
    string message = 1;
}
