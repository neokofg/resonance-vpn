name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-server:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-arm64
            cross: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake golang-go perl protobuf-compiler

      - name: Install cross-compilation deps
        if: matrix.cross
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: server-${{ matrix.target }}

      - name: Build server
        run: cargo build --release --target ${{ matrix.target }} -p resonance-server

      - name: Build daemon
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} -p resonance-daemon

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/resonance-server dist/
          if [ -f target/${{ matrix.target }}/release/resonance-daemon ]; then
            cp target/${{ matrix.target }}/release/resonance-daemon dist/
          fi
          cp config.example.toml dist/ 2>/dev/null || true
          cd dist && tar czf ../resonance-server-${{ matrix.name }}.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: resonance-server-${{ matrix.name }}
          path: resonance-server-${{ matrix.name }}.tar.gz

  build-gui:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake golang-go protobuf-compiler \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libssl-dev libgtk-3-dev libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev libglib2.0-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: Swatinem/rust-cache@v2
        with:
          key: gui-linux

      - name: Build Tauri app
        run: |
          cd gui
          npm ci
          npm run tauri build

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp gui/src-tauri/target/release/bundle/deb/*.deb dist/ 2>/dev/null || true
          cp gui/src-tauri/target/release/bundle/appimage/*.AppImage dist/ 2>/dev/null || true
          cp gui/src-tauri/target/release/bundle/rpm/*.rpm dist/ 2>/dev/null || true

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: resonance-vpn-gui-linux-deb
          path: dist/*.deb
          if-no-files-found: ignore

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: resonance-vpn-gui-linux-appimage
          path: dist/*.AppImage
          if-no-files-found: ignore

      - name: Upload rpm
        uses: actions/upload-artifact@v4
        with:
          name: resonance-vpn-gui-linux-rpm
          path: dist/*.rpm
          if-no-files-found: ignore

  release:
    needs: [build-server, build-gui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
